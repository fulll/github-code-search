# Reusable composite action — Start VitePress preview server
#
# Starts `bun run docs:preview` in the background and polls until the server
# responds (or fails after a configurable timeout). Reused by a11y.yaml,
# responsive.yaml, and any future workflow that needs a running docs preview.
#
# Usage:
#   - name: Start VitePress preview server
#     uses: ./.github/actions/start-preview-server
#     # (optionally) with:
#     #   port: "4173"
#     #   base: "/github-code-search/"
#     #   timeout: "60"
name: "Start VitePress preview server"
description: >
  Starts `bun run docs:preview` in the background on a given port and polls
  until the server responds — or fails after a configurable timeout.

inputs:
  port:
    description: TCP port the preview server should listen on.
    default: "4173"
  base:
    description: Base URL path to poll when checking readiness.
    default: "/github-code-search/"
  timeout:
    description: Maximum number of seconds to wait for the server to be ready.
    default: "60"

runs:
  using: composite
  steps:
    - name: Start VitePress preview
      shell: bash
      env:
        PORT: ${{ inputs.port }}
      run: bun run docs:preview -- --port "$PORT" &

    - name: Wait for preview server to be ready
      shell: bash
      env:
        PORT: ${{ inputs.port }}
        BASE: ${{ inputs.base }}
        TIMEOUT: ${{ inputs.timeout }}
      run: |
        # Validate TIMEOUT is a strictly positive integer to prevent arithmetic injection
        if ! printf '%s' "${TIMEOUT}" | grep -qE '^[1-9][0-9]*$'; then
          echo "::error::timeout input must be a strictly positive integer, got: ${TIMEOUT}"
          exit 1
        fi
        # Validate PORT is a strictly positive integer to prevent userinfo injection (e.g. 80@attacker.tld)
        if ! printf '%s' "${PORT}" | grep -qE '^[1-9][0-9]*$'; then
          echo "::error::port input must be a strictly positive integer, got: ${PORT}"
          exit 1
        fi
        # Validate PORT is within the valid TCP port range to avoid unreachable URLs
        if [ "${PORT}" -lt 1 ] || [ "${PORT}" -gt 65535 ]; then
          echo "::error::port input must be between 1 and 65535, got: ${PORT}"
          exit 1
        fi
        # Validate BASE starts with / and contains no spaces to prevent URL injection
        if ! printf '%s' "${BASE}" | grep -qE '^/[^ ]*$'; then
          echo "::error::base input must start with / and contain no spaces, got: ${BASE}"
          exit 1
        fi
        URL="http://localhost:${PORT}${BASE}"
        echo "Waiting for ${URL} …"
        DEADLINE=$(( $(date +%s) + TIMEOUT ))
        until curl -sf "${URL}" > /dev/null 2>&1; do
          if [ "$(date +%s)" -ge "${DEADLINE}" ]; then
            echo "::error::Preview server did not respond within ${TIMEOUT} s on ${URL}."
            exit 1
          fi
          echo "… retrying in 2 s"
          sleep 2
        done
        echo "Preview server is ready."
