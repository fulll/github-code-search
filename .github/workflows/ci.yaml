name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test · Format · Lint · Dead code
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Post LCOV coverage comment
        if: always() && github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@87a815f34ec27a5826abba44ce09bbc688da58fd # v0.4.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: coverage/lcov.info
        continue-on-error: true

      - name: Check formatting (oxfmt)
        run: bun run format:check

      - name: Lint (oxlint)
        run: bun run lint

      - name: Dead code detection (knip)
        run: bun run knip

  test-bats:
    name: Shell tests (bats)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bats
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # v4.0.0
        with:
          support-install: false
          assert-install: false
          detik-install: false
          file-install: false
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run install.sh shell tests
        shell: bash
        run: bats install.test.bats
